name: SEO quality gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SEO and content quality
        run: node scripts/seo-audit.mjs
