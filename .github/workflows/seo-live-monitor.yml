name: SEO live monitor

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:

jobs:
  live-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate live pages, sitemap, images, and redirects
        run: node scripts/live-seo-check.mjs
