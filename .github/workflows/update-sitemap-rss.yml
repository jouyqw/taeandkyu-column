name: Update sitemap and RSS

on:
  push:
    branches:
      - main
    paths:
      - "blog/**/*.html"
      - "index.html"
      - "scripts/generate-feeds.js"
      - "scripts/seo-audit.mjs"
      - "_redirects"
      - ".github/workflows/update-sitemap-rss.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sitemap and RSS
        run: node scripts/generate-feeds.js

      - name: Validate SEO and content quality
        run: node scripts/seo-audit.mjs

      - name: Commit generated files
        run: |
          if git diff --quiet -- sitemap.xml rss.xml; then
            echo "No sitemap or RSS changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml rss.xml
          git commit -m "Update sitemap and RSS"
          git push
