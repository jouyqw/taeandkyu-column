name: Scheduled publish

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create scheduled posts
        run: node scripts/scheduled-publish.mjs

      - name: Generate sitemap and RSS
        run: node scripts/generate-feeds.js

      - name: Validate SEO and content quality
        run: node scripts/seo-audit.mjs

      - name: Commit published posts
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog index.html sitemap.xml rss.xml
          git commit -m "Publish scheduled columns"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
