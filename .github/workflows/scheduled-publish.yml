name: Scheduled publish

on:
  schedule:
    # GitHub cron is UTC: 08:00 / 14:00 / 20:00 KST
    - cron: "0 23 * * *"
    - cron: "0 5 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      practice_group:
        description: "발행 분야"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - criminal
          - divorce
          - civil
      publish_date:
        description: "발행일(선택, YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select scheduled practice group
        shell: bash
        env:
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_GROUP: ${{ inputs.practice_group }}
          MANUAL_DATE: ${{ inputs.publish_date }}
        run: |
          case "$SCHEDULE" in
            "0 23 * * *") group="criminal" ;;
            "0 5 * * *") group="divorce" ;;
            "0 11 * * *") group="civil" ;;
            *) group="${MANUAL_GROUP:-all}" ;;
          esac
          echo "PUBLISH_GROUP=$group" >> "$GITHUB_ENV"
          if [ -n "$MANUAL_DATE" ]; then
            echo "PUBLISH_DATE=$MANUAL_DATE" >> "$GITHUB_ENV"
          fi
          echo "Publishing group: $group"

      - name: Create scheduled posts
        run: node scripts/scheduled-publish.mjs

      - name: Generate sitemap and RSS
        run: node scripts/generate-feeds.js

      - name: Validate SEO and content quality
        run: node scripts/seo-audit.mjs

      - name: Commit published posts
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog index.html sitemap.xml rss.xml
          git commit -m "Publish scheduled columns"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
